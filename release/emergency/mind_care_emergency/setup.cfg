[develop]
script_dir=$base/lib/mind_care_emergency
[install]
install_scripts=$base/lib/mind_care_emergency

# ROS Foxy 의 launch_testing(_ros) pytest plugin 이 옛 import_path 시그니처를
# 사용해 pytest >= 8.x 와 충돌 (TypeError: import_path() missing keyword-only
# argument 'consider_namespace_packages') — 플러그인 비활성화로 회피.
[tool:pytest]
addopts = -p no:launch -p no:launch_ros
